<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Motorsport Newsletter</title>
    <style>
      @font-face {
        font-family: 'Formula1';
        src: url('fonts/Formula1-Regular.otf') format('opentype');
        font-weight: 400;
      }
    
      @font-face {
        font-family: 'Formula1';
        src: url('fonts/Formula1-Bold.otf') format('opentype');
        font-weight: 500;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Ek+Mukta:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

<body class="grid-container">
  <header class="header-grid">
    <div class="header-gradient">
      <div class="logo">
        <img src="graphic/motorsport.jpg" alt="motorsport logo" width="183">
      </div>
    </div>
  </header>

  <main class="main-grid">
    <section class="hero-grid">
      <img src="graphic/franco-colapinto-movil.png" alt="Franco Colapinto" class="hero-img">
      <h1 class="grid-title">No te pierdas nada con Motorsport</h1>
      <p class="grid-subtitle">
        Últimas novedades de <br> Franco Colapinto, <br> calendario personalizado,<br> análisis en redes sociales <br> y mucho más, en Motorsport
      </p>
      <button class="grid-cta">Suscribite</button>

    <div class="divider-line"></div>
  </main>

</html>
